<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Book Karo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, button { margin-bottom: 10px; padding: 8px; width: 80%; max-width: 300px; display: block; }
    p { margin: 5px 0 15px 0; font-weight: bold; }
  </style>
</head>
<body>

<h2>🚕 Book Your Ride</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button onclick="getPickup()">📍 Get Pickup Location</button>
<p id="pickupText">Pickup: --</p>

<input id="drop" placeholder="Enter Drop Location">

<button onclick="calculateFare()">💰 Calculate Fare</button>

<p id="distanceText">Distance: --</p>
<p id="fareText">Fare: --</p>

<button onclick="bookRide()">✅ Book Ride</button>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCGq5g3zt23YkCmD81a-HrZq6effxmFPa0&libraries=places"></script>

<script src="app.js"></script>

</body>
</html>
