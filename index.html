<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoBike Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .page-section { display: none; }
        #mainMenu { display: block; }
        #map, #driverMap { height: 300px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ccc; }
        #driverMap { border-color: #ffc107; display: none; } 
        input { display: block; margin: 10px 0; padding: 8px; width: 90%; border-radius: 6px; border: 1px solid #aaa; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; border: none; }
        .btn-success { background-color: #28a745; color: white; border: none; }
        .btn-danger { background-color: #dc3545; color: white; border: none; }
        .instruction { background: #e1f5fe; padding: 8px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; color: #0288d1; }

        /* Timer and Swipe Style */
        .timer-badge { background: #dc3545; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; float: right; }
        .swipe-container { position: relative; width: 100%; height: 50px; background: #ddd; border-radius: 25px; margin-top: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .swipe-handle { position: absolute; left: 2px; width: 46px; height: 46px; background: #28a745; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: grab; transition: left 0.1s; z-index: 2; }
        
        .sms-toast { display: none; position: fixed; top: 15px; left: 5%; width: 84%; background: #222; color: #fff; padding: 15px; border-radius: 10px; z-index: 10000; border-left: 5px solid #ffc107; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ffc107; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .wallet-card { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="smsNotification" class="sms-toast">
        <div style="font-size: 0.7rem; color: #aaa;">💬 SMS SYSTEM</div>
        <div id="smsMessageContent" style="font-weight: bold;">Sending OTP...</div>
    </div>

    <div id="mainMenu" class="page-section">
        <h2>🏍️ GoBike Pro</h2>
        <button class="btn-primary" onclick="openPortal('rider')">Rider Portal</button>
        <button class="btn-primary" onclick="openPortal('driver')">Driver Portal</button>
    </div>

    <div id="riderPortal" class="page-section">
        <button onclick="goBack()">← Back</button>
        <h3>📍 Ride Booking</h3>
        <div id="map" style="height:250px;"></div>
        <input type="text" id="pickupLocation" placeholder="Pickup" readonly>
        <input type="text" id="dropLocation" placeholder="Drop" readonly>
        <input type="text" id="fullName" placeholder="Name">
        <input type="text" id="mobileNumber" placeholder="Mobile">
        <button class="btn-success" onclick="requestLiveBooking()">REQUEST RIDE & OTP</button>
    </div>

    <div id="driverPortal" class="page-section">
        <button onclick="goBack()">← Back</button>
        <h3>🏍️ Captain Room</h3>
        <button id="dutyBtn" class="btn-danger" onclick="toggleDuty()">GO ONLINE</button>
        
        <div id="driverMap"></div>
        <div id="driverSearchingState" style="display:none; text-align:center;">
            <div class="spinner"></div><p>Searching for rides...</p>
        </div>

        <div id="rideRequestCard" style="display: none; background: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 15px;">
            <div>⚡ New Ride! <span id="countdownTimer" class="timer-badge">10s</span></div>
            <p>Pickup: <span id="reqPickup">--</span></p>
            <p>Drop: <span id="reqDrop">--</span></p>
            <div class="swipe-container" id="swipeTrack">
                <div class="swipe-handle" id="swipeTrigger">➔</div>
                <div style="color:#666; font-weight:bold;">SWIPE TO ACCEPT</div>
            </div>
        </div>

        <div id="activeRideCard" style="display: none; background: #d4edda; padding: 15px;">
            <input type="number" id="otpInput" placeholder="ENTER OTP">
            <button class="btn-success" onclick="startRide()">VERIFY & START</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
