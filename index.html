<!DOCTYPE html>
<html>
<body>

<button id="btn">Get Location</button>

<script>
document.getElementById("btn").onclick = function () {
  navigator.geolocation.getCurrentPosition(
    function (pos) {
      alert("LAT: " + pos.coords.latitude);
    },
    function (err) {
      alert("ERROR: " + err.message);
    }
  );
};
</script>

</body>
</html>
