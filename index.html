<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoBike Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .page-section { display: none; }
        #mainMenu { display: block; }
        #map { height: 300px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ccc; }
        input { display: block; margin: 10px 0; padding: 8px; width: 90%; border-radius: 6px; border: 1px solid #aaa; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; border: none; }
        .btn-success { background-color: #28a745; color: white; border: none; }
        .instruction { background: #e1f5fe; padding: 8px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; color: #0288d1; }
    </style>
</head>
<body>

    <div id="mainMenu" class="page-section">
        <h2>🏍️ GoBike Pro</h2>
        <p>Production Ready Mobile Cloud Network</p>
        
        <button class="btn-primary" onclick="openPortal('rider')">Rider Portal (Book Bike)</button>
        <button class="btn-primary" onclick="openPortal('driver')">Driver Portal (Captain)</button>
        <button class="btn-primary" onclick="openPortal('admin')">Admin Control Dashboard</button>
    </div>

    <div id="riderPortal" class="page-section">
        <button onclick="goBack()">← Menu</button>
        <h3>📍 Ride Booking</h3>
        
        <div id="mapInstruction" class="instruction">Map par click karke <b>Pickup Location</b> select karein.</div>
        
        <div id="map"></div>
        <button onclick="resetLocations()" style="background:#dc3545; color:white; border:none; padding: 5px 10px; font-size:0.8rem;">Reset Map Locations</button>

        <div class="location-inputs">
            <label>Pickup Address:</label>
            <input type="text" id="pickupLocation" placeholder="Click on map to select pickup" readonly>
            
            <label>Drop Address:</label>
            <input type="text" id="dropLocation" placeholder="Click on map to select drop" readonly>
        </div>

        <div class="rider-info">
            <h4>RIDER INFORMATION</h4>
            <input type="text" id="fullName" placeholder="Enter Full Name">
            <input type="text" id="mobileNumber" placeholder="Enter Mobile Number (for OTP)">
        </div>

        <div class="fare-section" style="margin: 15px 0; background: #f8f9fa; padding: 10px; border-radius: 6px;">
            <div>Distance: <strong id="distanceDisplay">0.0 km</strong></div>
            <div style="margin-top: 5px;">Estimated Fare: <strong id="totalFareDisplay" style="color: green; font-size: 1.5rem;">₹0.00</strong></div>
        </div>

        <button id="requestBookingBtn" class="btn-success" onclick="requestLiveBooking()">REQUEST LIVE BOOKING</button>
    </div>

    <div id="driverPortal" class="page-section">
        <button onclick="goBack()">← Menu</button>
        <h3>🏍️ Captain Room</h3>
        <div id="driverStatus">STATUS: VERIFIED</div>
    </div>

    <div id="adminPortal" class="page-section">
        <button onclick="goBack()">← Menu</button>
        <h3>📊 Admin Core Control</h3>
        <p>Net Commission: ₹0.00</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
