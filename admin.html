<!DOCTYPE html>
<html>
<body>
    <h2>Admin Panel</h2>
    <input id="adminPhone" placeholder="Enter Admin Number">
    <button onclick="checkAdmin()">Login</button>
    <ul id="rideList" style="display:none;"></ul>
    <script>
        function checkAdmin() {
            if (document.getElementById("adminPhone").value === "7830722258") {
                document.getElementById("rideList").style.display = "block";
            } else { alert("Unauthorized"); }
        }
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
